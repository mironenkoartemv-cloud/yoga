version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yoga_user
      POSTGRES_PASSWORD: yoga_pass
      POSTGRES_DB: yoga_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Опционально: Redis для хранения OTP-кодов в проде
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://yoga_user:yoga_pass@db:5432/yoga_db
      JWT_SECRET: change_me_in_production
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SMS_PROVIDER: stub
      EXOLVE_API_KEY: STUB
      EXOLVE_SMS_SENDER: STUB
      YUKASSA_SHOP_ID: STUB
      YUKASSA_SECRET_KEY: STUB
      FIREBASE_SERVICE_ACCOUNT: '{}'
      STUN_URL: 'stun:stun.l.google.com:19302'
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
